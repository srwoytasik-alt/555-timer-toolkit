<main>

<h2>Monostable Timer</h2>

<p>
In monostable mode the 555 produces a single output pulse when triggered.
The pulse width depends on resistor R and capacitor C.
</p>

<h3>Timing Equation</h3>

<p>T = 1.1 × R × C</p>

<h3>Calculator</h3>

<label>Desired Time (seconds)</label>
<input id="time">

<label>Capacitor Value</label>

<input id="cap">

<select id="capUnit">

<option value="uF">µF</option>
<option value="nF">nF</option>
<option value="pF">pF</option>

</select>

<br><br>

<button onclick="calcMonostable()">Calculate Resistor</button>

<h3 id="result"></h3>
<img src="monostable.png" width="400">
</main>

<div id="footer"></div>
<input id="time" placeholder="1">

<input id="cap" placeholder="100">
